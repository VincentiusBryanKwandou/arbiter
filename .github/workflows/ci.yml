name: CI/CD — Arbiter

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  test:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest -q --tb=short
        env:
          ATLAS_MODE: paper
          ATLAS_PRIVATE_KEY: ""

      - name: Run ruff linter
        run: ruff check . --exclude dashboard-web,node_modules,.venv

      - name: Verify exporter dry-run
        run: python scripts/export_dashboard_data.py --dry-run || true

  build-web:
    name: Build Dashboard (Next.js)
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: dashboard-web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: dashboard-web/package-lock.json

      - name: Install npm packages
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BOT_NAME: Arbiter
          NEXT_PUBLIC_VERSION: "1.0.0"

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [test, build-web]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel Production
        run: |
          vercel --token ${{ secrets.VERCEL_TOKEN }} \
                 --prod \
                 --yes \
                 --cwd dashboard-web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Post deployment to summary
        run: |
          echo "## ✅ Deployed to Vercel" >> $GITHUB_STEP_SUMMARY
          echo "URL: https://arbiterbot.vercel.app" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
